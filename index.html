<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <title>Fisiologia Applicata — Consultazione rapida</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- ============ VISTA ELENCO ============ -->
  <header class="topbar">
    <div class="topbar__inner">
      <button id="backBtn" class="backbtn" hidden aria-label="Torna all'elenco">‹ Coordinate</button>
      <h1 class="topbar__title">Fisiologia Applicata</h1>
      <span class="topbar__sub">consultazione rapida</span>
      <button id="themeBtn" class="themebtn" type="button" aria-label="Cambia tema">🌙</button>
    </div>
    <div class="search" id="searchWrap">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Cerca muscolo, movimento o meridiano…" aria-label="Cerca" />
    </div>
  </header>

  <main id="listView" class="listview">
    <p class="hint">Scegli una coordinata per vedere tutto il correlato.</p>
    <div id="grid" class="grid"></div>
    <p id="noResults" class="noresults" hidden>Nessuna coordinata trovata.</p>
  </main>

  <!-- ============ VISTA DETTAGLIO ============ -->
  <main id="detailView" class="detailview" hidden>
    <div class="detail__head" id="detailHead"></div>
    <nav class="anchors" id="anchors" aria-label="Sezioni"></nav>
    <div class="sections" id="sections"></div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
